<script>
// Firebase 초기화
var firebaseConfig = {
  apiKey: "AIzaSyADG7JA4o7wiSchCHkCSy7kS_RJRpScXOQ",
  authDomain: "meal-planner-9b55f.firebaseapp.com",
  projectId: "meal-planner-9b55f",
  storageBucket: "meal-planner-9b55f.firebasestorage.app",
  messagingSenderId: "141285679820",
  appId: "1:141285679820:web:98d720d9e594a2e608d869",
  databaseURL: "https://meal-planner-9b55f-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var dbRef = db.ref('mealplanner');
var catRef = db.ref('categories');
var mealCatRefA = db.ref('mealcategories_a');
var mealCatRefB = db.ref('mealcategories_b');
var DEFAULT_MEAL_CATS = ['밥','라면','빵','샐러드','치킨','피자','김치찌개','된장찌개'];
var currentMealCatsA = [];
var currentMealCatsB = [];
var mealEditModeA = false;
var mealEditModeB = false;

mealCatRefA.on('value', function(snapshot) {
  var val = snapshot.val();
  currentMealCatsA = (val && val.list && val.list.length) ? val.list : DEFAULT_MEAL_CATS.slice();
  renderMealBtns('a');
});
mealCatRefB.on('value', function(snapshot) {
  var val = snapshot.val();
  currentMealCatsB = (val && val.list && val.list.length) ? val.list : DEFAULT_MEAL_CATS.slice();
  renderMealBtns('b');
});

function getMealCats(person){ return person==='a' ? currentMealCatsA : currentMealCatsB; }
function getMealRef(person){ return person==='a' ? mealCatRefA : mealCatRefB; }
function getMealEditMode(person){ return person==='a' ? mealEditModeA : mealEditModeB; }

function renderMealBtns(person) {
  var wrap = document.getElementById('meal-btns-'+person);
  if (!wrap) return;
  wrap.innerHTML = '';
  var cats = getMealCats(person);
  var editMode = getMealEditMode(person);
  cats.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = c;
    if (editMode) {
      var del = document.createElement('span');
      del.className = 'cat-del-btn';
      del.textContent = '✕';
      del.onclick = (function(name,p){ return function(e){ e.stopPropagation(); deleteMealItem(p,name); }; })(c,person);
      btn.appendChild(del);
    } else {
      btn.onclick = (function(name,p,b){ return function(){ selectMealBtn(p,b,name); }; })(c,person,btn);
    }
    wrap.appendChild(btn);
  });
}

function selectMealBtn(person, btn, name) {
  document.querySelectorAll('#meal-btns-'+person+' .cat-btn').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  document.getElementById('inp-'+person).value = name;
}

function toggleMealEdit(person) {
  if(person==='a'){ mealEditModeA=!mealEditModeA; }
  else { mealEditModeB=!mealEditModeB; }
  var editMode = getMealEditMode(person);
  document.getElementById('meal-add-row-'+person).style.display = editMode ? 'block' : 'none';
  var btnId = person==='a' ? 'meal-edit-btn-a' : 'meal-edit-btn-b2';
  var eb = document.getElementById(btnId); if(eb) eb.textContent = editMode ? '완료' : '편집';
  renderMealBtns(person);
}

function addMealItem(person) {
  var inp = document.getElementById('meal-new-input-'+person);
  var val = inp.value.trim();
  if (!val) return;
  var cats = getMealCats(person);
  if (cats.indexOf(val) !== -1) { inp.value=''; return; }
  cats.push(val);
  getMealRef(person).set({ list: cats });
  inp.value = '';
}

function deleteMealItem(person, name) {
  if(person==='a') currentMealCatsA = currentMealCatsA.filter(function(c){return c!==name;});
  else currentMealCatsB = currentMealCatsB.filter(function(c){return c!==name;});
  getMealRef(person).set({ list: getMealCats(person) });
}
var DEFAULT_CATS = ['쿠팡','마트','외식','병원','약국'];
var currentCats = [];
var catEditMode = false;

catRef.on('value', function(snapshot) {
  var val = snapshot.val();
  if (!val || !val.list || val.list.length === 0) {
    currentCats = DEFAULT_CATS.slice();
  } else {
    currentCats = val.list;
  }
  renderCatBtns();
});

function renderCatBtns() {
  var wrap = document.getElementById('cat-btns-wrap');
  if (!wrap) return;
  wrap.innerHTML = '';
  currentCats.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = c;
    if (catEditMode) {
      var del = document.createElement('span');
      del.className = 'cat-del-btn';
      del.textContent = '✕';
      del.onclick = (function(name) { return function(e) { e.stopPropagation(); deleteCatItem(name); }; })(c);
      btn.appendChild(del);
    } else {
      btn.onclick = (function(name) { return function() { selectCat(btn, name); }; })(c);
    }
    wrap.appendChild(btn);
  });
}

function toggleCatEdit() {
  catEditMode = !catEditMode;
  document.getElementById('cat-add-row').style.display = catEditMode ? 'block' : 'none';
  document.querySelector('.cat-manage-btn').textContent = catEditMode ? '완료' : '편집';
  renderCatBtns();
}

function addCatItem() {
  var val = document.getElementById('cat-new-input').value.trim();
  if (!val) return;
  if (currentCats.indexOf(val) !== -1) { document.getElementById('cat-new-input').value=''; return; }
  currentCats.push(val);
  catRef.set({ list: currentCats });
  document.getElementById('cat-new-input').value = '';
}

function deleteCatItem(name) {
  currentCats = currentCats.filter(function(c) { return c !== name; });
  catRef.set({ list: currentCats });
}

var DAYS=['월','화','수','목','금','토','일'];
var MEALS=[{key:'breakfast',label:'아침',color:'#639922'},{key:'lunch',label:'점심',color:'#185FA5'},{key:'dinner',label:'저녁',color:'#993C1D'}];
var PERSONS=[{key:'a',label:'다뱅'},{key:'b',label:'리안·지후'}];
var BUDGET=200000;
var weekOff=0,selDay=0,expOpen=false;
var mealCell=null,expDate=null,pending=null;
var D={};

// Firebase 실시간 연결
dbRef.on('value', function(snapshot) {
  D = snapshot.val() || {};
  document.getElementById('sync-dot').className='sync-dot on';
  document.getElementById('sync-txt').className='sync-txt on';
  document.getElementById('sync-txt').textContent='실시간 연결됨';
  render();
}, function(error) {
  document.getElementById('sync-dot').className='sync-dot';
  document.getElementById('sync-txt').className='sync-txt';
  document.getElementById('sync-txt').textContent='연결 끊김';
});

function save() {

function getMon(o){var d=new Date(),w=d.getDay();d.setDate(d.getDate()+(w===0?-6:1-w)+o*7);d.setHours(0,0,0,0);return d;}
function getDates(){var m=getMon(weekOff);return Array.from({length:7},function(_,i){var d=new Date(m);d.setDate(m.getDate()+i);return d;});}
function fmt(d){return (d.getMonth()+1)+'/'+d.getDate();}
function dkey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isToday(d){var t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function won(n){return n.toLocaleString()+'원';}
function daySpent(k){return ((D[k]&&D[k].expenses)||[]).reduce(function(s,e){return s+e.amount;},0);}

var currentTravelMember = '다정';
var TRAVEL_MEMBERS = ['다정','병관','리안','지후'];

var MEMBER_DEFAULTS = {
  '다정': ['스킨,로션,화장품','칫솔,치약','샴푸','바디워시','클렌징폼','속옷','양말','잠옷','다음날 입을 옷','비닐봉투'],

  '병관': ['스킨,로션','칫솔,치실','속옷','양말','잠옷','다음날 입을 옷','보조배터리,충전기','고데기,드라이기'],

};

function initMemberDefaults(){
  TRAVEL_MEMBERS.forEach(function(member){
    travelRef.child(member).once('value', function(snapshot){
      if(!snapshot.val()){
        var now = Date.now();
        (MEMBER_DEFAULTS[member]||[]).forEach(function(item, i){
          travelRef.child(member).push({ text:item, done:false, createdAt:now+i });
        });
      }
    });
  });
}
initMemberDefaults();

travelRef.on('value', function(snapshot){

});

}

function switchTravelTab(member){
  currentTravelMember = member;
  document.querySelectorAll('.travel-tab').forEach(function(t){
    t.classList.toggle('active', t.textContent===member);
  });

function addTravelItem(){
  var text = document.getElementById('travel-input').value.trim();
  if(!text) return;
  travelRef.child(currentTravelMember).push({ text:text, done:false, createdAt:Date.now() });
  document.getElementById('travel-input').value='';
}

function toggleTravelItem(member, id, done){
  travelRef.child(member).child(id).update({ done: !done });
}

function deleteTravelItem(member, id){
  travelRef.child(member).child(id).remove();
}

function clearTravelMember(){
  var memberData = travelData[currentTravelMember];
  if(!memberData) return;
  travelRef.child(currentTravelMember).remove();
}

function renderTravelList(){
  var list = document.getElementById('travel-list');
  var count = document.getElementById('travel-count');
  if(!list) return;
  var memberData = travelData[currentTravelMember];
  var items = memberData ? Object.entries(memberData).map(function(e){ return Object.assign({id:e[0]},e[1]); }) : [];
  items.sort(function(a,b){ return a.createdAt - b.createdAt; });
  var total = items.length;
  var doneCount = items.filter(function(t){ return t.done; }).length;
  count.textContent = total > 0 ? '전체 '+total+'개 · 완료 '+doneCount+'개' : '';
  list.innerHTML = '';
  if(total === 0){
    list.innerHTML = '<div class="todo-empty">'+currentTravelMember+'의 준비물을 추가해보세요 🧳</div>';
    return;
  }
  items.forEach(function(item){
    var el = document.createElement('div');
    el.className = 'todo-item' + (item.done ? ' done' : '');
    el.innerHTML =
      '<div class="todo-checkbox"><span class="todo-check-icon">✓</span></div>'+
      '<div class="todo-text">'+item.text+'</div>'+
      '<button class="todo-del">✕</button>';
    el.querySelector('.todo-checkbox').onclick = (function(m,id,done){ return function(e){ e.stopPropagation(); toggleTravelItem(m,id,done); }; })(currentTravelMember, item.id, item.done);
    el.querySelector('.todo-text').onclick = (function(m,id,done){ return function(){ toggleTravelItem(m,id,done); }; })(currentTravelMember, item.id, item.done);
    el.querySelector('.todo-del').onclick = (function(m,id){ return function(e){ e.stopPropagation(); deleteTravelItem(m,id); }; })(currentTravelMember, item.id);
    list.appendChild(el);
  });
  // 토글 버튼 업데이트
  var toggleBtn = document.getElementById('travel-toggle-btn');
  if(toggleBtn){
    if(total === 0){ toggleBtn.style.display='none'; }
    else {
      toggleBtn.style.display='block';
      var allDone = items.every(function(i){ return i.done; });
      toggleBtn.textContent = allDone ? '전체 선택해제' : '전체 선택';
      toggleBtn.style.borderColor = allDone ? '#ffb3b3' : '#B5D4F4';
      toggleBtn.style.color = allDone ? '#E24B4A' : '#185FA5';
    }
  }
  checkAllTravelStatus();
}

document.getElementById('travel-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') addTravelItem();
});

function toggleAllTravel(){
  var memberData = travelData[currentTravelMember];
  if(!memberData) return;
  var items = Object.entries(memberData).map(function(e){ return Object.assign({id:e[0]},e[1]); });
  var allDone = items.every(function(item){ return item.done; });
  items.forEach(function(item){
    travelRef.child(currentTravelMember).child(item.id).update({ done: !allDone });
  });
}

function checkAllTravelStatus(){
  var statusBar = document.getElementById('travel-status-bar');
  var statusMsg = document.getElementById('travel-status-msg');
  if(!statusBar) return;

  var notReadyMembers = [];
  TRAVEL_MEMBERS.forEach(function(member){
    var memberData = travelData[member];
    if(!memberData) return;
    var items = Object.values(memberData);
    if(items.length === 0) return;
    var hasUnchecked = items.some(function(item){ return !item.done; });
    if(hasUnchecked) notReadyMembers.push(member);
  });

  var hasAnyData = TRAVEL_MEMBERS.some(function(m){ return travelData[m] && Object.keys(travelData[m]).length > 0; });

  if(!hasAnyData){
    statusBar.style.display = 'none';
    return;
  }

  statusBar.style.display = 'flex';
  if(notReadyMembers.length === 0){
    statusBar.className = 'travel-status ok';
    statusBar.querySelector('.travel-status-icon').textContent = '✅';
    statusMsg.textContent = '모두 준비 완료!';
  } else {
    statusBar.className = 'travel-status warn';
    statusBar.querySelector('.travel-status-icon').textContent = '⚠️';
    statusMsg.textContent = notReadyMembers.join(', ') + ' 빼먹은 준비물이 있어요!';
  }
}

    item.querySelector('.todo-text').onclick = (function(id,done){ return function(){ toggleTodo(id,done); }; })(todo.id, todo.done);
    item.querySelector('.todo-del').onclick = (function(id){ return function(e){ e.stopPropagation(); deleteTodo(id); }; })(todo.id);
    list.appendChild(item);
  });
}

/* 장보기 자주쓰는 항목 */
var cartQuickRef = db.ref('cartquick');
var cartQuickItems = [];
var cartQuickEditMode = false;
var DEFAULT_CART_QUICK = ['우유','계란','두부','라면','쌀','김치','고기','과일'];

cartQuickRef.on('value', function(snapshot){
  var val = snapshot.val();
  cartQuickItems = (val&&val.list&&val.list.length) ? val.list : DEFAULT_CART_QUICK.slice();
  renderCartQuickBtns();
});

function renderCartQuickBtns(){
  var wrap = document.getElementById('cart-quick-btns');
  if(!wrap) return;
  wrap.innerHTML = '';
  cartQuickItems.forEach(function(c){
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = c;
    if(cartQuickEditMode){
      var del = document.createElement('span');
      del.className = 'cat-del-btn';
      del.textContent = '✕';
      del.onclick = (function(name){ return function(e){ e.stopPropagation(); deleteCartQuick(name); }; })(c);
      btn.appendChild(del);
    } else {
      btn.onclick = (function(name){ return function(){
        document.getElementById('cart-input').value = name;
        addCart();
      }; })(c);
    }
    wrap.appendChild(btn);
  });
}

function toggleCartEdit(){
  cartQuickEditMode = !cartQuickEditMode;
  document.getElementById('cart-quick-add-row').style.display = cartQuickEditMode ? 'block' : 'none';
  document.getElementById('cart-edit-btn').textContent = cartQuickEditMode ? '완료' : '편집';
  renderCartQuickBtns();
}

function addCartQuick(){
  var val = document.getElementById('cart-quick-input').value.trim();
  if(!val) return;
  if(cartQuickItems.indexOf(val)!==-1){ document.getElementById('cart-quick-input').value=''; return; }
  cartQuickItems.push(val);
  cartQuickRef.set({list:cartQuickItems});
  document.getElementById('cart-quick-input').value='';
}

function deleteCartQuick(name){
  cartQuickItems = cartQuickItems.filter(function(c){ return c!==name; });
  cartQuickRef.set({list:cartQuickItems});
}

/* 장바구니 */
var cartRef = db.ref('cartitems');
var cartItems = [];

cartRef.on('value', function(snapshot) {
  cartItems = snapshot.val() ? Object.entries(snapshot.val()).map(function(e){ return Object.assign({id:e[0]},e[1]); }) : [];
  cartItems.sort(function(a,b){ return a.createdAt - b.createdAt; });
  renderCart();
});

function openCart(){
  document.getElementById('cart-page').style.display='block';
  pushPage('cart');
}
function closeCart(){
  document.getElementById('cart-page').style.display='none';
  if(cartQuickEditMode){
    cartQuickEditMode=false;
    var row=document.getElementById('cart-quick-add-row');if(row)row.style.display='none';
    var eb=document.getElementById('cart-edit-btn');if(eb)eb.textContent='편집';
    renderCartQuickBtns();
  }
}

function addCart(){
  var text = document.getElementById('cart-input').value.trim();
  if(!text) return;
  cartRef.push({ text:text, done:false, createdAt:Date.now() });
  document.getElementById('cart-input').value='';
}

function toggleCart(id, done){
  cartRef.child(id).update({ done: !done });
}

function deleteCart(id){
  cartRef.child(id).remove();
}

function clearAllCart(){
  if(cartItems.length === 0) return;
  cartRef.remove();
}

function renderCart(){
  var list = document.getElementById('cart-list');
  var count = document.getElementById('cart-count');
  if(!list) return;
  var total = cartItems.length;
  var doneCount = cartItems.filter(function(t){ return t.done; }).length;
  count.textContent = total > 0 ? '전체 '+total+'개 · 완료 '+doneCount+'개' : '';
  list.innerHTML = '';
  if(total === 0){
    list.innerHTML = '<div class="todo-empty">장보기 리스트를 추가해보세요 🛒</div>';
    return;
  }
  cartItems.forEach(function(item){
    var el = document.createElement('div');
    el.className = 'todo-item' + (item.done ? ' done' : '');
    el.innerHTML =
      '<div class="todo-checkbox"><span class="todo-check-icon">✓</span></div>'+
      '<div class="todo-text">'+item.text+'</div>'+
      '<button class="todo-del">✕</button>';
    el.querySelector('.todo-checkbox').onclick = (function(id,done){ return function(e){ e.stopPropagation(); toggleCart(id,done); }; })(item.id, item.done);
    el.querySelector('.todo-text').onclick = (function(id,done){ return function(){ toggleCart(id,done); }; })(item.id, item.done);
    el.querySelector('.todo-del').onclick = (function(id){ return function(e){ e.stopPropagation(); deleteCart(id); }; })(item.id);
    list.appendChild(el);
  });
}

document.getElementById('cart-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') addCart();
});
document.addEventListener('keydown', function(e){
  var qi = document.getElementById('cart-quick-input');
  if(qi && document.activeElement===qi && e.key==='Enter') addCartQuick();
});

document.getElementById('todo-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') addTodo();
});

// 다크모드
var isDark=localStorage.getItem('darkmode')!==null?localStorage.getItem('darkmode')==='1':true;
function applyDark(){
  document.body.classList.toggle('dark',isDark);
  
}
function toggleDark(){
  isDark=!isDark;
  localStorage.setItem('darkmode',isDark?'1':'0');
  applyDark();
}
applyDark();

var currentTab='daily';

function openStats(){
  document.getElementById('stats-page').style.display='block';
  pushPage('stats');
  renderStats();
}
function closeStats(){
  document.getElementById('stats-page').style.display='none';
}
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.stats-tab').forEach(function(t,i){
    t.className='stats-tab'+((['daily','weekly','monthly'][i]===tab)?' active':'');
  });
  renderStats();
}

function getChartColors(){
  var dark=document.body.classList.contains('dark');
  return {
    line: dark?'#5BA8F5':'#185FA5',
    lineBg: dark?'rgba(91,168,245,0.1)':'rgba(24,95,165,0.08)',
    bar: dark?'rgba(91,168,245,0.8)':'rgba(24,95,165,0.7)',
    monthLine: dark?'#FF8A65':'#993C1D',
    monthBg: dark?'rgba(255,138,101,0.1)':'rgba(153,60,29,0.08)',
    gridColor: dark?'#2e2e2e':'#f0f0f0',
    tickColor: dark?'#888':'#666',
    tooltipBg: dark?'#333':'#fff',
    tooltipColor: dark?'#f0f0f0':'#111'
  };
}
function renderStats(){
  var content=document.getElementById('stats-content');
  if(currentTab==='daily') renderDaily(content);
  else if(currentTab==='weekly') renderWeekly(content);
  else renderMonthly(content);
}

function getAllDates(){
  var keys=Object.keys(D).filter(function(k){return k.match(/^\d{4}-\d{2}-\d{2}$/);});
  return keys.sort();
}

var chartInstance=null;
function destroyChart(){if(chartInstance){chartInstance.destroy();chartInstance=null;}}

function renderDaily(el){
  destroyChart();
  var dates=getDates();
  var weekTotal=dates.reduce(function(s,d){return s+daySpent(dkey(d));},0);
  var avgDay=weekTotal>0?Math.round(weekTotal/7):0;

  var html='<div class="stats-summary">';
  html+='<div class="stats-sum-item"><div class="stats-sum-val">'+won(weekTotal)+'</div><div class="stats-sum-lbl">이번 주 합계</div></div>';
  html+='<div class="stats-sum-item"><div class="stats-sum-val">'+won(avgDay)+'</div><div class="stats-sum-lbl">일 평균</div></div>';
  html+='</div>';
  html+='<div class="stats-section-title">이번 주 일별 지출</div>';
  html+='<div class="chart-wrap"><canvas id="mainChart" class="chart-canvas"></canvas></div>';

  // 항목별
  var catMap={};
  dates.forEach(function(d){
    ((D[dkey(d)]&&D[dkey(d)].expenses)||[]).forEach(function(e){catMap[e.name]=(catMap[e.name]||0)+e.amount;});
  });
  var cats=Object.keys(catMap).sort(function(a,b){return catMap[b]-catMap[a];});
  html+='<div class="stats-section-title">이번 주 항목별</div>';
  if(cats.length===0){html+='<div class="stats-empty">지출 내역이 없어요</div>';}
  else{
    html+='<div class="chart-wrap"><canvas id="catChart" class="chart-canvas"></canvas></div>';
  }
  el.innerHTML=html;

  // 일별 라인 차트
  var labels=dates.map(function(d,i){return DAYS[i]+'\n'+fmt(d);});
  var vals=dates.map(function(d){return daySpent(dkey(d));});
  var todayIdx=dates.findIndex(function(d){return isToday(d);});
  var ptColors=vals.map(function(_,i){return i===todayIdx?'#E24B4A':'#185FA5';});
  var cc=getChartColors();
  chartInstance=new Chart(document.getElementById('mainChart'),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:'지출',data:vals,
        borderColor:cc.line,backgroundColor:cc.lineBg,
        pointBackgroundColor:ptColors,pointBorderColor:ptColors,
        pointRadius:6,pointHoverRadius:8,
        fill:true,tension:0.3,borderWidth:2
      }]
    },
    options:{
      responsive:true,
      plugins:{legend:{display:false},tooltip:{backgroundColor:cc.tooltipBg,titleColor:cc.tooltipColor,bodyColor:cc.tooltipColor,callbacks:{label:function(c){return won(c.raw);}}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:11},color:cc.tickColor}},
        y:{beginAtZero:true,ticks:{callback:function(v){return v===0?'0':(v/10000).toFixed(1)+'만';},color:cc.tickColor},grid:{color:cc.gridColor}}
      }
    }
  });

  // 항목별 바 차트
  if(cats.length>0){
    var cc2=getChartColors();
    new Chart(document.getElementById('catChart'),{
      type:'bar',
      data:{
        labels:cats,
        datasets:[{label:'금액',data:cats.map(function(c){return catMap[c];}),backgroundColor:cc2.bar,borderRadius:6,borderSkipped:false}]
      },
      options:{
        responsive:true,
        plugins:{legend:{display:false},tooltip:{backgroundColor:cc2.tooltipBg,titleColor:cc2.tooltipColor,bodyColor:cc2.tooltipColor,callbacks:{label:function(c){return won(c.raw);}}}},
        scales:{
          x:{grid:{display:false},ticks:{font:{size:11},color:cc2.tickColor}},
          y:{beginAtZero:true,ticks:{callback:function(v){return v===0?'0':(v/10000).toFixed(1)+'만';},color:cc2.tickColor},grid:{color:cc2.gridColor}}
        }
      }
    });
  }
}

function renderWeekly(el){
  destroyChart();
  var allKeys=getAllDates();
  if(allKeys.length===0){el.innerHTML='<div class="stats-empty">지출 내역이 없어요</div>';return;}
  var weekMap={};
  allKeys.forEach(function(k){
    var d=new Date(k);var day=d.getDay();var mon=new Date(d);
    mon.setDate(d.getDate()-(day===0?6:day-1));
    var wk=dkey(mon);if(!weekMap[wk])weekMap[wk]=0;weekMap[wk]+=daySpent(k);
  });
  var weeks=Object.keys(weekMap).sort();
  var total=weeks.reduce(function(s,w){return s+weekMap[w];},0);
  var avg=weeks.length>0?Math.round(total/weeks.length):0;
  var html='<div class="stats-summary">';
  html+='<div class="stats-sum-item"><div class="stats-sum-val">'+won(total)+'</div><div class="stats-sum-lbl">전체 합계</div></div>';
  html+='<div class="stats-sum-item"><div class="stats-sum-val">'+won(avg)+'</div><div class="stats-sum-lbl">주 평균</div></div>';
  html+='</div>';

  // 가장 많이 아낀 주 (지출이 적을수록 절약)
  html+='<div class="stats-section-title">👑 절약 TOP 3</div>';
  if(weeks.length<2){
    html+='<div class="crown-empty">데이터가 2주 이상 쌓이면 표시돼요</div>';
  } else {
    // 평균 대비 절약액 계산
    var savings=weeks.map(function(w){return {week:w,amt:weekMap[w],saved:avg-weekMap[w]};});
    var topped=savings.filter(function(s){return s.saved>0;}).sort(function(a,b){return b.saved-a.saved;}).slice(0,3);
    var crowns=['🥇','🥈','🥉'];
    var rankClass=['r1','r2','r3'];
    if(topped.length===0){
      html+='<div class="crown-empty">평균보다 적게 쓴 주가 없어요</div>';
    } else {
      html+='<div class="crown-section">';
      topped.forEach(function(s,i){
        var d=new Date(s.week);var sun=new Date(d);sun.setDate(d.getDate()+6);
        var label=fmt(d)+'~'+fmt(sun);
        var weekNum=Math.ceil(d.getDate()/7);
        var yearShort=String(d.getFullYear()).slice(-2);
        var monthLabel=yearShort+'년 '+(d.getMonth()+1)+'월 '+weekNum+'주차';
        html+='<div class="crown-card"><div class="crown-row">';
        html+='<div class="crown-rank '+rankClass[i]+'">'+crowns[i]+'</div>';
        html+='<div class="crown-info"><div class="crown-week">'+label+' <span style="font-size:11px;color:#888;font-weight:400;">('+monthLabel+')</span></div><div class="crown-saved">'+won(s.amt)+' 지출</div></div>';
        html+='<div class="crown-amt">-'+won(s.saved)+'</div>';
        html+='</div></div>';
      });
      html+='</div>';
    }
  }

  html+='<div class="stats-section-title">주별 지출</div>';
  html+='<div class="chart-wrap"><canvas id="mainChart" class="chart-canvas"></canvas></div>';
  el.innerHTML=html;
  var labels=weeks.map(function(w){var d=new Date(w);var s=new Date(d);s.setDate(d.getDate()+6);return fmt(d)+'~'+fmt(s);});
  var vals=weeks.map(function(w){return weekMap[w];});
  var cc3=getChartColors();
  chartInstance=new Chart(document.getElementById('mainChart'),{
    type:'bar',
    data:{labels:labels,datasets:[{label:'지출',data:vals,backgroundColor:cc3.bar,borderRadius:8,borderSkipped:false}]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{backgroundColor:cc3.tooltipBg,titleColor:cc3.tooltipColor,bodyColor:cc3.tooltipColor,callbacks:{label:function(c){return won(c.raw);}}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:30,color:cc3.tickColor}},y:{beginAtZero:true,ticks:{callback:function(v){return v===0?'0':(v/10000).toFixed(1)+'만';},color:cc3.tickColor},grid:{color:cc3.gridColor}}}}
  });
}

function renderMonthly(el){
  destroyChart();
  var allKeys=getAllDates();
  if(allKeys.length===0){el.innerHTML='<div class="stats-empty">지출 내역이 없어요</div>';return;}
  var monthMap={};
  allKeys.forEach(function(k){var ym=k.substring(0,7);if(!monthMap[ym])monthMap[ym]=0;monthMap[ym]+=daySpent(k);});
  var months=Object.keys(monthMap).sort();
  var total=months.reduce(function(s,m){return s+monthMap[m];},0);
  var avg=months.length>0?Math.round(total/months.length):0;
  var html='<div class="stats-summary">';
  html+='<div class="stats-sum-item"><div class="stats-sum-val">'+won(total)+'</div><div class="stats-sum-lbl">전체 합계</div></div>';
  html+='<div class="stats-sum-item"><div class="stats-sum-val">'+won(avg)+'</div><div class="stats-sum-lbl">월 평균</div></div>';
  html+='</div>';

  // 월별 절약 TOP3
  html+='<div class="stats-section-title">👑 절약 TOP 3</div>';
  if(months.length<2){
    html+='<div class="crown-empty">데이터가 2개월 이상 쌓이면 표시돼요</div>';
  } else {
    var savings=months.map(function(m){return {month:m,amt:monthMap[m],saved:avg-monthMap[m]};});
    var topped=savings.filter(function(s){return s.saved>0;}).sort(function(a,b){return b.saved-a.saved;}).slice(0,3);
    var crowns=['🥇','🥈','🥉'];
    var rankClass=['r1','r2','r3'];
    if(topped.length===0){
      html+='<div class="crown-empty">평균보다 적게 쓴 달이 없어요</div>';
    } else {
      html+='<div class="crown-section">';
      topped.forEach(function(s,i){
        var p=s.month.split('-');
        var label=p[0]+'년 '+parseInt(p[1])+'월';
        html+='<div class="crown-card"><div class="crown-row">';
        html+='<div class="crown-rank '+rankClass[i]+'">'+crowns[i]+'</div>';
        html+='<div class="crown-info"><div class="crown-week">'+label+'</div><div class="crown-saved">'+won(s.amt)+' 지출</div></div>';
        html+='<div class="crown-amt">-'+won(s.saved)+'</div>';
        html+='</div></div>';
      });
      html+='</div>';
    }
  }

  html+='<div class="stats-section-title">월별 지출</div>';
  html+='<div class="chart-wrap"><canvas id="mainChart" class="chart-canvas"></canvas></div>';
  el.innerHTML=html;
  var labels=months.map(function(m){var p=m.split('-');return p[0]+'년 '+parseInt(p[1])+'월';});
  var vals=months.map(function(m){return monthMap[m];});
  var cc4=getChartColors();
  chartInstance=new Chart(document.getElementById('mainChart'),{
    type:'line',
    data:{labels:labels,datasets:[{label:'지출',data:vals,borderColor:cc4.monthLine,backgroundColor:cc4.monthBg,pointBackgroundColor:cc4.monthLine,pointRadius:6,pointHoverRadius:8,fill:true,tension:0.3,borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{backgroundColor:cc4.tooltipBg,titleColor:cc4.tooltipColor,bodyColor:cc4.tooltipColor,callbacks:{label:function(c){return won(c.raw);}}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11},color:cc4.tickColor}},y:{beginAtZero:true,ticks:{callback:function(v){return v===0?'0':(v/10000).toFixed(1)+'만';},color:cc4.tickColor},grid:{color:cc4.gridColor}}}}
  });
}
