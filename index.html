  <title>다뱅 Home</title>
  <!-- ver8.5 -->
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{width:100%;height:100%;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    .app{width:100%;max-width:100%;padding:0 0 40px;background:#f5f5f5;min-height:100vh;}

    /* 다크모드 */
    body.dark{background:#1a1a1a;}
    body.dark .app{background:#1a1a1a;}
    body.dark .top-bar .top-title{color:#f0f0f0;}
    body.dark .week-txt{color:#aaa;}
    body.dark .nav-btn{background:#2a2a2a;border-color:#444;color:#ccc;}
    body.dark .budget-wrap,body.dark .exp-wrap,body.dark .meal-sec,body.dark .stats-card,body.dark .crown-card,body.dark .chart-wrap{background:#2a2a2a;border-color:#3a3a3a;}
    body.dark .budget-ttl,body.dark .b-remain,body.dark .exp-lbl,body.dark .meal-name,body.dark .day-heading,body.dark .exp-row-name,body.dark .exp-row-amt,body.dark .stats-sum-val,body.dark .crown-week,body.dark .stats-bar-name,body.dark .stats-bar-amt{color:#f0f0f0;}
    body.dark .b-total,body.dark .b-meta-txt,body.dark .exp-total,body.dark .exp-empty,body.dark .sync-txt,body.dark .stats-sum-lbl,body.dark .crown-saved,body.dark .stats-section-title{color:#888;}
    body.dark .b-bar-bg{background:#3a3a3a;}
    body.dark .day-tab{background:#2a2a2a;border-color:#3a3a3a;}
    body.dark .day-tab .dn{color:#aaa;}
    body.dark .day-tab .dd,.day-tab .ds{color:#666;}
    body.dark .day-tab.active{background:#333;border-color:#666;}
    body.dark .day-tab.active .dn{color:#f0f0f0;}
    body.dark .day-tab.today-tab{border-color:#378ADD;}
    body.dark .day-tab.today-tab .dn{color:#5BA8F5;}
    body.dark .day-tab.today-tab.active{background:#1a3a5a;}
    body.dark .meal-hdr{background:#333;border-color:#3a3a3a;}
    body.dark .persons-grid{border-color:#3a3a3a;}
    body.dark .person-box:first-child{border-color:#3a3a3a;}
    body.dark .person-lbl{color:#f0f0f0;border-bottom-color:#3a3a3a;} body.dark .person-add-btn{color:#5BA8F5;border-color:#1a4a7a;}
    body.dark .food-tag{background:#333;border-color:#444;color:#f0f0f0;}
    body.dark .empty-txt{color:#555;}
    body.dark .exp-hdr{background:#333;}
    body.dark .exp-body{border-color:#3a3a3a;}
    body.dark .exp-row{border-color:#3a3a3a;}
    body.dark .chevron svg circle{stroke:#555;}
    body.dark .chevron svg path{stroke:#aaa;}
    body.dark .stats-btn{background:#2a2a2a;border-color:#3a3a3a;color:#f0f0f0;} 
    body.dark .stats-page{background:#1a1a1a;}
    body.dark .stats-header{background:#222;border-color:#333;}
    body.dark .stats-title{color:#f0f0f0;}
    body.dark .stats-back{background:#333;border-color:#555;color:#ccc;}
    body.dark .stats-tab{color:#555;}
    body.dark .stats-tab.active{color:#5BA8F5;border-color:#5BA8F5;}
    body.dark .stats-summary{background:#222;border-color:#333;}
    body.dark .stats-sum-val{color:#5BA8F5;}
    body.dark .stats-sum-lbl{color:#666;}
    body.dark .stats-section-title{color:#777;}
    body.dark .stats-card{background:#222;border-color:#333;}
    body.dark .stats-row{border-color:#2e2e2e;}
    body.dark .stats-row-label{color:#e0e0e0;}
    body.dark .stats-row-sub{color:#666;}
    body.dark .stats-row-amt{color:#f0f0f0;}
    body.dark .stats-bar-row{border-color:#2e2e2e;}
    body.dark .stats-bar-name{color:#e0e0e0;}
    body.dark .stats-bar-amt{color:#f0f0f0;}
    body.dark .stats-bar-bg{background:#333;}
    body.dark .stats-bar-fill{background:#5BA8F5;}
    body.dark .stats-empty{color:#555;}
    body.dark .crown-card{background:#222;border-color:#333;}
    body.dark .crown-row{border-color:#2e2e2e;}
    body.dark .crown-week{color:#f0f0f0;}
    body.dark .crown-saved{color:#777;}
    body.dark .crown-amt{color:#4CAF50;}
    body.dark .crown-rank.r1{background:#2a2200;}
    body.dark .crown-rank.r2{background:#252525;}
    body.dark .crown-rank.r3{background:#2a1500;}
    body.dark .crown-empty{color:#555;}
    body.dark .chart-wrap{background:#222;border-color:#333;}
    body.dark .sheet{background:#2a2a2a;}
    body.dark .sheet-handle{background:#444;}
    body.dark .sheet-title{color:#f0f0f0;}
    body.dark .sheet-sub{color:#888;}
    body.dark .inp-lbl{color:#aaa;}
    body.dark .inp-row input{background:#333;border-color:#444;color:#f0f0f0;}
    body.dark .inp-row input::placeholder{color:#666;}
    body.dark .btn-cancel{background:#333;border-color:#444;color:#aaa;}
    body.dark .cat-btn{background:#333;border-color:#444;color:#aaa;}
    body.dark .cat-btn.selected{background:#185FA5;color:#fff;border-color:#185FA5;}
    body.dark .cfm-box{background:#2a2a2a;}
    body.dark .cfm-handle{background:#444;}
    body.dark .cfm-name{color:#f0f0f0;}
    body.dark .cfm-msg{color:#888;}
    body.dark .btn-keep{background:#333;border-color:#444;color:#aaa;}
    body.dark .add-meal-btn{border-color:#1a4a7a;color:#5BA8F5;}
    body.dark .add-exp-btn{border-color:#7a5000;color:#F5A623;}

    .dark-btn{width:clamp(30px,9vw,38px);height:clamp(30px,9vw,38px);border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4vw,18px);flex-shrink:0;}
    body.dark .dark-btn{background:#2a2a2a;border-color:#444;}

    /* 할일 페이지 */
    .todo-page{position:fixed;inset:0;background:#f5f5f5;z-index:400;overflow-y:auto;}
    body.dark .todo-page{background:#1a1a1a;}
    .todo-header{display:flex;align-items:center;gap:12px;padding:clamp(14px,4vw,18px) clamp(12px,4vw,16px);background:#fff;border-bottom:1px solid #e0e0e0;position:sticky;top:0;z-index:10;}
    body.dark .todo-header{background:#222;border-color:#333;}
    .todo-back{width:36px;height:36px;border-radius:50%;border:1px solid #ddd;background:none;cursor:pointer;font-size:18px;color:#555;display:flex;align-items:center;justify-content:center;}
    body.dark .todo-back{border-color:#444;color:#aaa;background:#333;}
    .todo-title{font-size:clamp(15px,4.5vw,18px);font-weight:700;color:#111;flex:1;}
    body.dark .todo-title{color:#f0f0f0;}
    .todo-body{padding:clamp(12px,4vw,16px);}
    .todo-input-row{display:flex;gap:8px;margin-bottom:16px;width:100%;}
    .todo-input{flex:1;min-width:0;padding:clamp(10px,3vw,13px) clamp(8px,3vw,12px);font-size:clamp(13px,3.5vw,15px);border:1.5px solid #ddd;border-radius:14px;background:#fff;color:#111;outline:none;}
    .todo-input:focus{border-color:#185FA5;}
    body.dark .todo-input{background:#2a2a2a;border-color:#444;color:#f0f0f0;}
    body.dark .todo-input:focus{border-color:#5BA8F5;}
    .todo-add-btn{padding:0 clamp(12px,3.5vw,16px);height:clamp(44px,12vw,52px);border:none;border-radius:14px;background:#185FA5;color:#fff;font-size:clamp(13px,3.5vw,15px);font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;}
    .todo-add-btn:active{background:#0C447C;}
    .todo-list{display:flex;flex-direction:column;gap:8px;}
    .todo-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:3px clamp(10px,3vw,14px);cursor:pointer;}
    body.dark .todo-item{background:#222;border-color:#333;}
    .todo-item.done{opacity:0.5;}
    .todo-checkbox{width:22px;height:22px;border-radius:6px;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
    .todo-item.done .todo-checkbox{background:#185FA5;border-color:#185FA5;}
    body.dark .todo-checkbox{border-color:#555;}
    .todo-check-icon{font-size:13px;color:#fff;display:none;}
    .todo-item.done .todo-check-icon{display:block;}
    .todo-text{flex:1;font-size:clamp(14px,4vw,16px);color:#222;line-height:1.4;}
    body.dark .todo-text{color:#f0f0f0;}
    .todo-item.done .todo-text{text-decoration:line-through;color:#aaa;}
    .todo-del{width:28px;height:28px;border-radius:50%;border:none;background:none;cursor:pointer;font-size:16px;color:#ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .todo-del:active{color:#E24B4A;background:#f5f5f5;}
    body.dark .todo-del:active{background:#333;}
    .todo-empty{text-align:center;padding:50px 0;color:#ccc;font-size:14px;}
    .todo-count{font-size:12px;color:#aaa;margin-bottom:10px;}
    body.dark .todo-count{color:#666;}
    .quick-nav-btn{flex:1;padding:clamp(10px,3vw,12px) 0;border:1px solid #e0e0e0;border-radius:14px;background:#fff;cursor:pointer;font-size:clamp(13px,3.5vw,15px);font-weight:600;color:#333;display:flex;align-items:center;justify-content:center;gap:6px;}
    .quick-nav-btn:active{background:#f0f0f0;}
    body.dark .quick-nav-btn{background:#2a2a2a;border-color:#3a3a3a;color:#f0f0f0;}
    body.dark .quick-nav-btn:active{background:#333;}
    .travel-tab-row{display:flex;gap:0;border-bottom:1px solid #e0e0e0;background:#fff;position:sticky;top:64px;z-index:5;}
    body.dark .travel-tab-row{background:#222;border-color:#333;}
    .travel-tab{flex:1;padding:clamp(10px,3vw,13px) 4px;text-align:center;font-size:clamp(13px,3.5vw,15px);font-weight:500;color:#aaa;border-bottom:2px solid transparent;cursor:pointer;}
    .travel-tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:700;}
    body.dark .travel-tab{color:#555;}
    body.dark .travel-tab.active{color:#5BA8F5;border-bottom-color:#5BA8F5;}
    .travel-content{padding:clamp(12px,4vw,16px);}
    .travel-member-title{font-size:clamp(14px,4vw,16px);font-weight:700;color:#111;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
    body.dark .travel-member-title{color:#f0f0f0;}
    .travel-status{padding:clamp(8px,2.5vw,10px) clamp(12px,4vw,16px);border-radius:14px;display:flex;align-items:center;gap:10px;font-size:clamp(13px,3.5vw,15px);font-weight:600;}
    .travel-status.warn{background:#FFF3E0;border:1px solid #FFB74D;color:#E65100;}
    .travel-status.ok{background:#E8F5E9;border:1px solid #81C784;color:#2E7D32;}
    body.dark .travel-status.warn{background:#3a2500;border-color:#cc7700;color:#FFB74D;}
    body.dark .travel-status.ok{background:#1a3a1a;border-color:#4CAF50;color:#81C784;}
    .travel-status-icon{font-size:18px;flex-shrink:0;}
    .todo-item{transition:transform 0.15s, box-shadow 0.15s;}
    .todo-item.dragging{opacity:0.3;border:2px dashed #185FA5;transform:scale(0.97);box-shadow:none;}
    .todo-item.drag-over{border-top:3px solid #185FA5;transform:translateY(4px);background:#E6F1FB;}
    body.dark .todo-item.drag-over{background:#1a3a5a;}
    .drag-handle{font-size:18px;color:#bbb;cursor:grab;padding:0 6px;flex-shrink:0;user-select:none;touch-action:none;}
    .drag-handle:active{cursor:grabbing;color:#185FA5;}
    body.dark .drag-handle{color:#555;}
    body.dark .drag-handle:active{color:#5BA8F5;}
    .sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 16px;font-size:11px;}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;}
    .sync-dot.on{background:#639922;}
    .sync-txt{color:#aaa;}
    .sync-txt.on{color:#639922;}

    .top-bar{padding:clamp(8px,3vw,12px) clamp(12px,4vw,16px) 0;display:flex;align-items:center;justify-content:space-between;}
    .top-title{font-size:clamp(16px,5vw,20px);font-weight:600;color:#111;}
    .week-nav{display:flex;align-items:center;gap:6px;} .btn-group-left{display:flex;align-items:center;gap:10px;margin-right:6px;}
    .nav-btn{width:clamp(24px,6vw,30px);height:clamp(24px,6vw,30px);border-radius:50%;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:clamp(11px,3vw,14px);color:#555;display:flex;align-items:center;justify-content:center;}
    .nav-btn:active{background:#eee;}
    .week-txt{font-size:clamp(11px,3vw,13px);color:#666;min-width:80px;text-align:center;}

    .budget-wrap{margin:clamp(8px,3vw,12px) clamp(12px,4vw,16px) 0;border:1px solid #e0e0e0;border-radius:14px;overflow:hidden;background:#fff;}
    .budget-top{display:flex;align-items:center;justify-content:space-between;padding:clamp(10px,3vw,13px) clamp(12px,4vw,14px) 8px;}
    .budget-ttl{font-size:clamp(12px,3.5vw,14px);font-weight:500;color:#222;}
    .b-amounts{display:flex;align-items:baseline;gap:6px;}
    .b-remain{font-size:clamp(16px,5vw,20px);font-weight:600;}
    .b-remain.ok{color:#3B6D11;} .b-remain.warn{color:#BA7517;} .b-remain.over{color:#A32D2D;}
    .b-total{font-size:clamp(11px,3vw,13px);color:#999;}
    .b-bar-wrap{padding:0 clamp(12px,4vw,14px) clamp(10px,3vw,12px);}
    .b-bar-bg{height:7px;background:#f0f0f0;border-radius:4px;overflow:hidden;}
    .b-bar-fill{height:100%;border-radius:4px;transition:width 0.3s;}
    .b-bar-fill.ok{background:#639922;} .b-bar-fill.warn{background:#EF9F27;} .b-bar-fill.over{background:#E24B4A;}
    .b-meta{display:flex;justify-content:space-between;margin-top:5px;}
    .b-meta-txt{font-size:clamp(10px,3vw,12px);color:#888;}

    .exp-wrap{margin:clamp(8px,3vw,12px) clamp(12px,4vw,16px) 0;border:1px solid #e0e0e0;border-radius:14px;overflow:hidden;background:#fff;}
    .exp-hdr{display:flex;align-items:center;padding:clamp(9px,3vw,11px) clamp(10px,3vw,12px);background:#fafafa;cursor:pointer;user-select:none;gap:6px;}
    .exp-lbl{font-size:clamp(12px,3.5vw,14px);font-weight:500;color:#222;}
    .exp-total{font-size:clamp(11px,3vw,13px);color:#888;flex:1;}
    .exp-hdr-right{display:flex;align-items:center;gap:22px;}
    .chevron{transition:transform 0.2s;display:inline-flex;align-items:center;padding-right:2px;}
    .chevron.open{transform:rotate(180deg);}
    .add-exp-btn{font-size:clamp(11px,3vw,13px);color:#854F0B;background:none;border:1px solid #FAC775;border-radius:20px;padding:clamp(3px,1.5vw,5px) clamp(10px,3vw,14px);cursor:pointer;white-space:nowrap;}
    .add-exp-btn:active{background:#FAEEDA;}
    .exp-body{overflow:hidden;max-height:0;transition:max-height 0.25s ease;}
    .exp-body.open{max-height:500px;border-top:1px solid #f0f0f0;}
    .exp-list{padding:8px clamp(10px,3vw,12px);}
    .exp-empty{font-size:clamp(11px,3vw,13px);color:#bbb;padding:6px 0 8px;}
    .exp-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f5f5f5;cursor:pointer;}
    .exp-row:last-child{border-bottom:none;}
    .exp-row-name{flex:1;font-size:clamp(12px,3.5vw,14px);color:#222;}
    .exp-row-amt{font-size:clamp(12px,3.5vw,14px);font-weight:500;color:#222;}

    .tabs-wrap{padding:clamp(8px,3vw,12px) clamp(12px,4vw,16px) 0;}
    .tabs-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:clamp(3px,1.5vw,6px);}
    .day-tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:clamp(6px,2vw,9px) 2px;border-radius:12px;border:1px solid #e0e0e0;cursor:pointer;background:#fff;}
    .day-tab .dn{font-size:clamp(12px,3.5vw,14px);font-weight:500;color:#888;}
    .day-tab .dd{font-size:clamp(9px,2.5vw,11px);color:#bbb;}
    .day-tab .ds{font-size:clamp(9px,2.5vw,11px);color:#bbb;margin-top:1px;}
    .day-tab.active{background:#f0f0f0;border-color:#aaa;}
    .day-tab.active .dn{color:#222;}
    .day-tab.today-tab{border-color:#378ADD;}
    .day-tab.today-tab .dn{color:#185FA5;}
    .day-tab.today-tab.active{background:#E6F1FB;}

    .day-view{padding:clamp(10px,3vw,14px) clamp(12px,4vw,16px) 0;}
    .day-heading{font-size:clamp(14px,4vw,16px);font-weight:600;color:#111;margin-bottom:clamp(8px,3vw,12px);display:flex;align-items:center;gap:8px;}
    .today-badge{font-size:clamp(9px,2.5vw,11px);background:#E6F1FB;color:#185FA5;border-radius:20px;padding:2px 8px;font-weight:500;}
    .meal-sec{margin-bottom:clamp(8px,3vw,12px);border:1px solid #e0e0e0;border-radius:14px;overflow:hidden;background:#fff;}
    .meal-hdr{display:flex;align-items:center;justify-content:space-between;padding:4px clamp(10px,3vw,12px);background:#fafafa;border-bottom:1px solid #f0f0f0;}
    .meal-hdr-left{display:flex;align-items:center;gap:7px;}
    .meal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .meal-name{font-size:clamp(12px,3.5vw,14px);font-weight:500;color:#222;}
    .add-meal-btn{font-size:clamp(11px,3vw,13px);color:#185FA5;background:none;border:1px solid #B5D4F4;border-radius:20px;padding:clamp(3px,1.5vw,5px) clamp(10px,3vw,14px);cursor:pointer;white-space:nowrap;}
    .add-meal-btn:active{background:#E6F1FB;}
    .persons-grid{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #f0f0f0;}
    .person-box{padding:clamp(8px,2.5vw,12px) clamp(10px,3vw,14px);min-height:clamp(64px,18vw,80px);}
    .person-box:first-child{border-right:1px solid #f0f0f0;}
    .person-lbl{font-size:clamp(11px,3vw,13px);font-weight:600;color:#222;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;justify-content:space-between;}
    .person-add-btn{font-size:11px;color:#185FA5;background:none;border:0.5px solid #B5D4F4;border-radius:20px;padding:2px 8px;cursor:pointer;font-weight:400;flex-shrink:0;}
    .person-add-btn:active{background:#E6F1FB;}
    .tag-list{display:flex;flex-wrap:wrap;gap:5px;align-items:flex-start;}
    .food-tag{background:#f5f5f5;border:1px solid #e0e0e0;border-radius:10px;padding:clamp(5px,2vw,8px) clamp(10px,3vw,14px);font-size:clamp(14px,4.5vw,17px);color:#222;cursor:pointer;}
    .food-tag:active{background:#ffe0e0;}
    .empty-txt{font-size:clamp(11px,3vw,13px);color:#ccc;}

    .cat-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
    .cat-btn{padding:clamp(6px,2vw,8px) clamp(10px,3vw,14px);font-size:clamp(12px,3.5vw,14px);border:1.5px solid #ddd;border-radius:20px;background:#f5f5f5;color:#555;cursor:pointer;transition:all 0.15s;}
    .cat-btn:active{background:#eee;}
    .cat-btn.selected{background:#185FA5;color:#fff;border-color:#185FA5;}

    .stats-btn-wrap{padding:0 clamp(12px,4vw,16px);margin-top:clamp(8px,3vw,12px);}

<script>
// Firebase 초기화
var firebaseConfig = {
  apiKey: "AIzaSyADG7JA4o7wiSchCHkCSy7kS_RJRpScXOQ",
  authDomain: "meal-planner-9b55f.firebaseapp.com",
  projectId: "meal-planner-9b55f",
  storageBucket: "meal-planner-9b55f.firebasestorage.app",
  messagingSenderId: "141285679820",
  appId: "1:141285679820:web:98d720d9e594a2e608d869",
  databaseURL: "https://meal-planner-9b55f-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var dbRef = db.ref('mealplanner');
var catRef = db.ref('categories');
var mealCatRefA = db.ref('mealcategories_a');
var mealCatRefB = db.ref('mealcategories_b');
var DEFAULT_MEAL_CATS = ['밥','라면','빵','샐러드','치킨','피자','김치찌개','된장찌개'];
var currentMealCatsA = [];
var currentMealCatsB = [];
var mealEditModeA = false;
var mealEditModeB = false;

mealCatRefA.on('value', function(snapshot) {
  var val = snapshot.val();
  currentMealCatsA = (val && val.list && val.list.length) ? val.list : DEFAULT_MEAL_CATS.slice();
  renderMealBtns('a');
});
mealCatRefB.on('value', function(snapshot) {
  var val = snapshot.val();
  currentMealCatsB = (val && val.list && val.list.length) ? val.list : DEFAULT_MEAL_CATS.slice();
  renderMealBtns('b');
});

function getMealCats(person){ return person==='a' ? currentMealCatsA : currentMealCatsB; }
function getMealRef(person){ return person==='a' ? mealCatRefA : mealCatRefB; }
function getMealEditMode(person){ return person==='a' ? mealEditModeA : mealEditModeB; }

function renderMealBtns(person) {
  var wrap = document.getElementById('meal-btns-'+person);
  if (!wrap) return;
  wrap.innerHTML = '';
  var cats = getMealCats(person);
  var editMode = getMealEditMode(person);
  cats.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = c;
    if (editMode) {
      var del = document.createElement('span');
      del.className = 'cat-del-btn';
      del.textContent = '✕';
      del.onclick = (function(name,p){ return function(e){ e.stopPropagation(); deleteMealItem(p,name); }; })(c,person);
      btn.appendChild(del);
    } else {
      btn.onclick = (function(name,p,b){ return function(){ selectMealBtn(p,b,name); }; })(c,person,btn);
    }
    wrap.appendChild(btn);
  });
}

function selectMealBtn(person, btn, name) {
  document.querySelectorAll('#meal-btns-'+person+' .cat-btn').forEach(function(b){b.classList.remove('selected');});
  btn.classList.add('selected');
  document.getElementById('inp-'+person).value = name;
}

function toggleMealEdit(person) {
  if(person==='a'){ mealEditModeA=!mealEditModeA; }
  else { mealEditModeB=!mealEditModeB; }
  var editMode = getMealEditMode(person);
  document.getElementById('meal-add-row-'+person).style.display = editMode ? 'block' : 'none';
  var btnId = person==='a' ? 'meal-edit-btn-a' : 'meal-edit-btn-b2';
  var eb = document.getElementById(btnId); if(eb) eb.textContent = editMode ? '완료' : '편집';
  renderMealBtns(person);
}

function addMealItem(person) {
  var inp = document.getElementById('meal-new-input-'+person);
  var val = inp.value.trim();
  if (!val) return;
  var cats = getMealCats(person);
  if (cats.indexOf(val) !== -1) { inp.value=''; return; }
  cats.push(val);
  getMealRef(person).set({ list: cats });
  inp.value = '';
}

function deleteMealItem(person, name) {
  if(person==='a') currentMealCatsA = currentMealCatsA.filter(function(c){return c!==name;});
  else currentMealCatsB = currentMealCatsB.filter(function(c){return c!==name;});
  getMealRef(person).set({ list: getMealCats(person) });

function dkey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function renderTravelList(){
  var list = document.getElementById('travel-list');
  var count = document.getElementById('travel-count');
  if(!list) return;
  var memberData = travelData[currentTravelMember];
  var items = memberData ? Object.entries(memberData).map(function(e){ return Object.assign({id:e[0]},e[1]); }) : [];
  items.sort(function(a,b){ return a.createdAt - b.createdAt; });
  var total = items.length;
  var doneCount = items.filter(function(t){ return t.done; }).length;
  count.textContent = total > 0 ? '전체 '+total+'개 · 완료 '+doneCount+'개' : '';
  list.innerHTML = '';
  if(total === 0){
    list.innerHTML = '<div class="todo-empty">'+currentTravelMember+'의 준비물을 추가해보세요 🧳</div>';
    return;
  }
  var memberRef = travelRef.child(currentTravelMember);
  items.forEach(function(item){
    var el = document.createElement('div');
    el.className = 'todo-item' + (item.done ? ' done' : '');
    el.innerHTML =
      '<div class="drag-handle">☰</div>'+
      '<div class="todo-checkbox"><span class="todo-check-icon">✓</span></div>'+
      '<div class="todo-text">'+item.text+'</div>'+
      '<button class="todo-del">✕</button>';
    el.querySelector('.todo-checkbox').onclick = (function(m,id,done){ return function(e){ e.stopPropagation(); toggleTravelItem(m,id,done); }; })(currentTravelMember, item.id, item.done);
    el.querySelector('.todo-text').onclick = (function(m,id,done){ return function(){ toggleTravelItem(m,id,done); }; })(currentTravelMember, item.id, item.done);
    el.querySelector('.todo-del').onclick = (function(m,id){ return function(e){ e.stopPropagation(); deleteTravelItem(m,id); }; })(currentTravelMember, item.id);
    makeDraggable(el, item.id, items, memberRef, list);
    list.appendChild(el);
  });
  // 토글 버튼 업데이트
  var toggleBtn = document.getElementById('travel-toggle-btn');
  if(toggleBtn){
    if(total === 0){ toggleBtn.style.display='none'; }
    else {
      toggleBtn.style.display='block';
      var allDone = items.every(function(i){ return i.done; });
      toggleBtn.textContent = allDone ? '전체 선택해제' : '전체 선택';
      toggleBtn.style.borderColor = allDone ? '#ffb3b3' : '#B5D4F4';
      toggleBtn.style.color = allDone ? '#E24B4A' : '#185FA5';
    }
  }
  checkAllTravelStatus();
}

function toggleAllTravel(){
  var memberData = travelData[currentTravelMember];
  if(!memberData) return;
  var items = Object.entries(memberData).map(function(e){ return Object.assign({id:e[0]},e[1]); });
  var allDone = items.every(function(item){ return item.done; });
  items.forEach(function(item){
    travelRef.child(currentTravelMember).child(item.id).update({ done: !allDone });
  });
}

function checkAllTravelStatus(){
  var statusBar = document.getElementById('travel-status-bar');
  var statusMsg = document.getElementById('travel-status-msg');
  if(!statusBar) return;

  var notReadyMembers = [];
  TRAVEL_MEMBERS.forEach(function(member){
    var memberData = travelData[member];
    if(!memberData) return;
    var items = Object.values(memberData);
    if(items.length === 0) return;
    var hasUnchecked = items.some(function(item){ return !item.done; });
    if(hasUnchecked) notReadyMembers.push(member);
  });

  var hasAnyData = TRAVEL_MEMBERS.some(function(m){ return travelData[m] && Object.keys(travelData[m]).length > 0; });

  if(!hasAnyData){
    statusBar.style.display = 'none';
    return;
  }

  statusBar.style.display = 'flex';
  if(notReadyMembers.length === 0){
    statusBar.className = 'travel-status ok';
    statusBar.querySelector('.travel-status-icon').textContent = '✅';
    statusMsg.textContent = '모두 준비 완료!';
  } else {
    statusBar.className = 'travel-status warn';
    statusBar.querySelector('.travel-status-icon').textContent = '⚠️';
    statusMsg.textContent = notReadyMembers.join(', ') + ' 빼먹은 준비물이 있어요!';
  }
}

  count.textContent = total > 0 ? '전체 '+total+'개 · 완료 '+doneCount+'개' : '';
  list.innerHTML = '';
  if(total === 0){
    list.innerHTML = '<div class="todo-empty">To-Do 리스트를 추가해보세요 😊</div>';
    return;
  }
  var dragSrcId = null;
  todos.forEach(function(todo){
    var item = document.createElement('div');
    item.className = 'todo-item' + (todo.done ? ' done' : '');
    item.draggable = true;
    item.dataset.id = todo.id;
    item.innerHTML =
      '<div class="drag-handle">☰</div>'+
      '<div class="todo-checkbox"><span class="todo-check-icon">✓</span></div>'+
      '<div class="todo-text">'+todo.text+'</div>'+
      '<button class="todo-del">✕</button>';
    item.querySelector('.todo-checkbox').onclick = (function(id,done){ return function(e){ e.stopPropagation(); toggleTodo(id,done); }; })(todo.id, todo.done);
    item.querySelector('.todo-text').onclick = (function(id,done){ return function(){ toggleTodo(id,done); }; })(todo.id, todo.done);
    item.querySelector('.todo-del').onclick = (function(id){ return function(e){ e.stopPropagation(); deleteTodo(id); }; })(todo.id);

    item.addEventListener('dragstart', function(e){
      dragSrcId = todo.id;
      setTimeout(function(){ item.classList.add('dragging'); }, 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', function(){
      item.classList.remove('dragging');
      list.querySelectorAll('.todo-item').forEach(function(el){ el.classList.remove('drag-over'); });
    });
    item.addEventListener('dragover', function(e){
      e.preventDefault();
      list.querySelectorAll('.todo-item').forEach(function(el){ el.classList.remove('drag-over'); });
      if(todo.id !== dragSrcId) item.classList.add('drag-over');
    });
    item.addEventListener('drop', function(e){
      e.preventDefault();
      if(dragSrcId && dragSrcId !== todo.id){
        var srcIdx = todos.findIndex(function(t){ return t.id === dragSrcId; });
        var dstIdx = todos.findIndex(function(t){ return t.id === todo.id; });
        var reordered = todos.slice();
        var removed = reordered.splice(srcIdx, 1)[0];
        reordered.splice(dstIdx, 0, removed);
        // createdAt 재정렬
        var now = Date.now();
        var updates = {};
        reordered.forEach(function(t, i){
          updates[t.id + '/createdAt'] = now + i;
        });
        todoRef.update(updates);
      }
    });

    // 터치 드래그 (모바일)
    var touchStartY = 0, touchItem = null;
    item.querySelector('.drag-handle').addEventListener('touchstart', function(e){
      touchStartY = e.touches[0].clientY;
      touchItem = item;
      item.classList.add('dragging');
      dragSrcId = todo.id;
    }, {passive:true});
    item.querySelector('.drag-handle').addEventListener('touchmove', function(e){
      e.preventDefault();
      var touch = e.touches[0];
      var els = list.querySelectorAll('.todo-item');
      els.forEach(function(el){ el.classList.remove('drag-over'); });
      var target = document.elementFromPoint(touch.clientX, touch.clientY);
      if(target){
        var targetItem = target.closest('.todo-item');
        if(targetItem && targetItem !== item) targetItem.classList.add('drag-over');
      }
    }, {passive:false});
    item.querySelector('.drag-handle').addEventListener('touchend', function(e){
      item.classList.remove('dragging');
      var touch = e.changedTouches[0];
      var target = document.elementFromPoint(touch.clientX, touch.clientY);
      if(target){
        var targetItem = target.closest('.todo-item');
        if(targetItem && targetItem !== item){
          var targetId = targetItem.dataset.id;
          var srcIdx = todos.findIndex(function(t){ return t.id === dragSrcId; });
          var dstIdx = todos.findIndex(function(t){ return t.id === targetId; });
          if(srcIdx !== -1 && dstIdx !== -1){
            var reordered = todos.slice();
            var removed = reordered.splice(srcIdx, 1)[0];
            reordered.splice(dstIdx, 0, removed);
            var now = Date.now();
            var updates = {};
            reordered.forEach(function(t, i){ updates[t.id + '/createdAt'] = now + i; });
            todoRef.update(updates);
          }
        }
      }
      list.querySelectorAll('.todo-item').forEach(function(el){ el.classList.remove('drag-over'); });
      dragSrcId = null;
    });

    list.appendChild(item);
  });
}

function makeDraggable(item, itemId, items, ref, list){
  item.draggable = true;
  item.dataset.id = itemId;

  item.addEventListener('dragstart', function(e){
    item._dragSrcId = itemId;
    list._dragSrcId = itemId;
    setTimeout(function(){ item.classList.add('dragging'); }, 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  item.addEventListener('dragend', function(){
    item.classList.remove('dragging');
    list.querySelectorAll('.todo-item').forEach(function(el){ el.classList.remove('drag-over'); });
  });
  item.addEventListener('dragover', function(e){
    e.preventDefault();
    list.querySelectorAll('.todo-item').forEach(function(el){ el.classList.remove('drag-over'); });
    if(list._dragSrcId !== itemId) item.classList.add('drag-over');
  });
  item.addEventListener('drop', function(e){
    e.preventDefault();
    var srcId = list._dragSrcId;
    if(srcId && srcId !== itemId){
      var srcIdx = items.findIndex(function(t){ return t.id === srcId; });
      var dstIdx = items.findIndex(function(t){ return t.id === itemId; });
      var reordered = items.slice();
      var removed = reordered.splice(srcIdx, 1)[0];
      reordered.splice(dstIdx, 0, removed);
      var now = Date.now();
      var updates = {};
      reordered.forEach(function(t, i){ updates[t.id + '/createdAt'] = now + i; });
      ref.update(updates);
    }
  });

  var handle = item.querySelector('.drag-handle');
  if(!handle) return;
  handle.addEventListener('touchstart', function(e){
    list._dragSrcId = itemId;
    item.classList.add('dragging');
  }, {passive:true});
  handle.addEventListener('touchmove', function(e){
    e.preventDefault();
    var touch = e.touches[0];
    list.querySelectorAll('.todo-item').forEach(function(el){ el.classList.remove('drag-over'); });
    var target = document.elementFromPoint(touch.clientX, touch.clientY);
    if(target){ var ti = target.closest('.todo-item'); if(ti && ti !== item) ti.classList.add('drag-over'); }
  }, {passive:false});
  handle.addEventListener('touchend', function(e){
    item.classList.remove('dragging');
    var touch = e.changedTouches[0];
    var target = document.elementFromPoint(touch.clientX, touch.clientY);
    if(target){
      var ti = target.closest('.todo-item');
      if(ti && ti !== item){
        var targetId = ti.dataset.id;
        var srcIdx = items.findIndex(function(t){ return t.id === list._dragSrcId; });
        var dstIdx = items.findIndex(function(t){ return t.id === targetId; });
        if(srcIdx !== -1 && dstIdx !== -1){
          var reordered = items.slice();
          var removed = reordered.splice(srcIdx, 1)[0];
          reordered.splice(dstIdx, 0, removed);
          var now = Date.now();
          var updates = {};
          reordered.forEach(function(t, i){ updates[t.id + '/createdAt'] = now + i; });
          ref.update(updates);
        }
      }
    }
    list.querySelectorAll('.todo-item').forEach(function(el){ el.classList.remove('drag-over'); });
    list._dragSrcId = null;
  });
}

}

  });
  var cats=Object.keys(catMap).sort(function(a,b){return catMap[b]-catMap[a];});

function renderWeekly(el){
  destroyChart();
  var allKeys=getAllDates();
  if(allKeys.length===0){el.innerHTML='<div class="stats-empty">지출 내역이 없어요</div>';return;}
  var weekMap={};
  allKeys.forEach(function(k){
    var d=new Date(k);var day=d.getDay();var mon=new Date(d);
    mon.setDate(d.getDate()-(day===0?6:day-1));
    var wk=dkey(mon);if(!weekMap[wk])weekMap[wk]=0;weekMap[wk]+=daySpent(k);
  });
  var weeks=Object.keys(weekMap).sort();
  var total=weeks.reduce(function(s,w){return s+weekMap[w];},0);
  var avg=weeks.length>0?Math.round(total/weeks.length):0;
  var html='<div class="stats-summary">';

        html+='</div></div>';
      });

    }
  }

  html+='<div class="stats-section-title">주별 지출</div>';
  html+='<div class="chart-wrap"><canvas id="mainChart" class="chart-canvas"></canvas></div>';
  el.innerHTML=html;
  var labels=weeks.map(function(w){var d=new Date(w);var s=new Date(d);s.setDate(d.getDate()+6);return fmt(d)+'~'+fmt(s);});
  var vals=weeks.map(function(w){return weekMap[w];});
  var cc3=getChartColors();
  chartInstance=new Chart(document.getElementById('mainChart'),{
    type:'bar',
    data:{labels:labels,datasets:[{label:'지출',data:vals,backgroundColor:cc3.bar,borderRadius:8,borderSkipped:false}]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{backgroundColor:cc3.tooltipBg,titleColor:cc3.tooltipColor,bodyColor:cc3.tooltipColor,callbacks:{label:function(c){return won(c.raw);}}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:10},maxRotation:30,color:cc3.tickColor}},y:{beginAtZero:true,ticks:{callback:function(v){return v===0?'0':(v/10000).toFixed(1)+'만';},color:cc3.tickColor},grid:{color:cc3.gridColor}}}}
  });

  var html='<div class="stats-summary">';
  html+='<div class="stats-sum-item"><div class="stats-sum-val">'+won(total)+'</div><div class="stats-sum-lbl">전체 합계</div></div>';
  html+='<div class="stats-sum-item"><div class="stats-sum-val">'+won(avg)+'</div><div class="stats-sum-lbl">월 평균</div></div>';
  html+='</div>';

  // 월별 절약 TOP3
  html+='<div class="stats-section-title">👑 절약 TOP 3</div>';
  if(months.length<2){
    html+='<div class="crown-empty">데이터가 2개월 이상 쌓이면 표시돼요</div>';
  } else {
    var savings=months.map(function(m){return {month:m,amt:monthMap[m],saved:avg-monthMap[m]};});
    var topped=savings.filter(function(s){return s.saved>0;}).sort(function(a,b){return b.saved-a.saved;}).slice(0,3);
    var crowns=['🥇','🥈','🥉'];
    var rankClass=['r1','r2','r3'];
    if(topped.length===0){
      html+='<div class="crown-empty">평균보다 적게 쓴 달이 없어요</div>';
    } else {
      html+='<div class="crown-section">';
      topped.forEach(function(s,i){
        var p=s.month.split('-');
        var label=p[0]+'년 '+parseInt(p[1])+'월';
        html+='<div class="crown-card"><div class="crown-row">';
        html+='<div class="crown-rank '+rankClass[i]+'">'+crowns[i]+'</div>';
        html+='<div class="crown-info"><div class="crown-week">'+label+'</div><div class="crown-saved">'+won(s.amt)+' 지출</div></div>';
        html+='<div class="crown-amt">-'+won(s.saved)+'</div>';
        html+='</div></div>';
      });
      html+='</div>';
    }
  }

  html+='<div class="stats-section-title">월별 지출</div>';
  html+='<div class="chart-wrap"><canvas id="mainChart" class="chart-canvas"></canvas></div>';
  el.innerHTML=html;
  var labels=months.map(function(m){var p=m.split('-');return p[0]+'년 '+parseInt(p[1])+'월';});
  var vals=months.map(function(m){return monthMap[m];});
  var cc4=getChartColors();
  chartInstance=new Chart(document.getElementById('mainChart'),{
    type:'line',
    data:{labels:labels,datasets:[{label:'지출',data:vals,borderColor:cc4.monthLine,backgroundColor:cc4.monthBg,pointBackgroundColor:cc4.monthLine,pointRadius:6,pointHoverRadius:8,fill:true,tension:0.3,borderWidth:2}]},
    options:{responsive:true,plugins:{legend:{display:false},tooltip:{backgroundColor:cc4.tooltipBg,titleColor:cc4.tooltipColor,bodyColor:cc4.tooltipColor,callbacks:{label:function(c){return won(c.raw);}}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11},color:cc4.tickColor}},y:{beginAtZero:true,ticks:{callback:function(v){return v===0?'0':(v/10000).toFixed(1)+'만';},color:cc4.tickColor},grid:{color:cc4.gridColor}}}}
  });
}

/* ===== 식단 추가 ===== */
var _md='', _mk='';

function mealOpen(dateStr, mealKey, lbl) {
  _md=dateStr; _mk=mealKey;
  document.getElementById('meal-title').textContent=lbl;
  document.getElementById('meal-inp-a').value='';
  document.getElementById('meal-inp-b').value='';
  document.getElementById('meal-edit-btn').textContent='편집';
  document.getElementById('meal-quick-add-row').style.display='none';
  _mealQuickEdit=false;
  renderMealQuickBtns();
  document.getElementById('meal-overlay').style.display='flex';
  setTimeout(function(){ document.getElementById('meal-inp-a').focus(); },150);
}

var _mealQuickEdit = false;

function renderMealQuickBtns() {
  var wrap = document.getElementById('meal-quick-btns');
  wrap.innerHTML = '';
  var cats = currentMealCatsA.concat(currentMealCatsB.filter(function(c){ return currentMealCatsA.indexOf(c)===-1; }));
  cats.forEach(function(c){
    var btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = c;
    if(_mealQuickEdit){
      var del = document.createElement('span');
      del.className = 'cat-del-btn';
      del.textContent = '✕';
      del.onclick = (function(name){ return function(e){
        e.stopPropagation();
        currentMealCatsA = currentMealCatsA.filter(function(x){return x!==name;});
        currentMealCatsB = currentMealCatsB.filter(function(x){return x!==name;});
        mealCatRefA.set({list:currentMealCatsA});
        mealCatRefB.set({list:currentMealCatsB});
        renderMealQuickBtns();
      };})(c);
      btn.appendChild(del);
    } else {
      btn.onclick = (function(name){ return function(){
        document.querySelectorAll('#meal-quick-btns .cat-btn').forEach(function(b){b.classList.remove('selected');});
        btn.classList.add('selected');
        // 다뱅 비어있으면 다뱅에, 아니면 리후에
        var ia = document.getElementById('meal-inp-a');
        var ib = document.getElementById('meal-inp-b');
        if(!ia.value) ia.value = name;
        else ib.value = name;
      };})(c);
    }
    wrap.appendChild(btn);
  });
}

function toggleMealQuickEdit(){
  _mealQuickEdit = !_mealQuickEdit;
  document.getElementById('meal-quick-add-row').style.display = _mealQuickEdit ? 'block' : 'none';
  document.getElementById('meal-edit-btn').textContent = _mealQuickEdit ? '완료' : '편집';
  renderMealQuickBtns();
}

function addMealQuickItem(){
  var val = document.getElementById('meal-quick-new').value.trim();
  if(!val) return;
  if(currentMealCatsA.indexOf(val)===-1){ currentMealCatsA.push(val); mealCatRefA.set({list:currentMealCatsA}); }
  if(currentMealCatsB.indexOf(val)===-1){ currentMealCatsB.push(val); mealCatRefB.set({list:currentMealCatsB}); }
  document.getElementById('meal-quick-new').value='';
  renderMealQuickBtns();
}

function mealSave() {
  var va=document.getElementById('meal-inp-a').value.trim();
  var vb=document.getElementById('meal-inp-b').value.trim();
  if(!va&&!vb){ document.getElementById('meal-inp-a').focus(); return; }
  if(!D[_md])D[_md]={};
  if(!D[_md][_mk])D[_md][_mk]={a:[],b:[]};
  // Firebase에서 배열이 객체로 변환될 수 있으므로 안전하게 변환
  var arrA = D[_md][_mk].a;
  var arrB = D[_md][_mk].b;
  if(!Array.isArray(arrA)) arrA = arrA ? Object.values(arrA) : [];
  if(!Array.isArray(arrB)) arrB = arrB ? Object.values(arrB) : [];
  if(va) arrA.push(va);
  if(vb) arrB.push(vb);
  D[_md][_mk].a = arrA;
  D[_md][_mk].b = arrB;
  save(); render(); mealClose();
}

function mealClose() {
  document.getElementById('meal-overlay').style.display='none';
  _md=''; _mk='';
}



/* ===== 끝 ===== */
</script>
